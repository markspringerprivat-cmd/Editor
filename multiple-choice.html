<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Single & Multiple Choice – Editor</title>
  <link rel="stylesheet" href="style.css?v=50" />
</head>
<body id="top" data-page="h5p-lite" data-activity="multiple-choice">
  <main class="page-shell h5p-lite-shell">
    <a class="back-link" href="index.html#top">← Zur Editor-Übersicht</a>

    <section class="iv-hero blind-readable uniform-hover" data-blind-target="h5p-lite-intro" tabindex="0" role="button" aria-label="Einführung vorlesen">
      <p class="eyebrow">Eigene H5P-ähnliche Testfunktion</p>
      <h1>Single & Multiple Choice</h1>
      <p>Erstelle eine Frage mit beliebig vielen Antwortmöglichkeiten. Wähle zwischen einer richtigen Antwort oder mehreren richtigen Antworten.</p>
    </section>

    <div class="blind-mode-row">
      <button class="blind-mode-toggle" id="blindModeToggle" type="button" aria-pressed="false">Vorlesemodus: aus</button>
      <p class="blind-mode-hint" id="blindModeHint" hidden></p>
    </div>

    <div class="top-divider" aria-hidden="true"></div>

    <section class="h5p-lite-layout" aria-label="Multiple-Choice-Editor">
      <div class="h5p-lite-preview-panel">
        <article class="h5p-lite-question-preview" id="mcPreview"></article>
        <div class="iv-feedback" id="mcFeedback" hidden></div>
      </div>
      <div class="iv-editor-stack">
        <section class="iv-editor-panel blind-readable" data-blind-target="h5p-lite-panel" tabindex="0" role="button" aria-label="Editor vorlesen">
          <h2>Frage bearbeiten</h2>
          <div class="iv-field"><label for="questionInput">Frage</label><textarea id="questionInput"></textarea></div>
          <div class="iv-field"><label for="descriptionInput">Zusatztext</label><textarea id="descriptionInput"></textarea></div>
          <div class="iv-field"><label for="questionModeInput">Frageformat</label><select id="questionModeInput"><option value="single">Single Choice</option><option value="multiple">Multiple Choice</option></select></div>
          <div class="iv-field"><label>Antwortmöglichkeiten</label><div class="mc-answer-list" id="answerList"></div><button class="iv-secondary-button" id="addAnswerButton" type="button">Antwort hinzufügen</button></div>
        </section>
        <section class="iv-list-panel h5p-lite-config-panel">
          <h2>Konfiguration</h2>
          <div class="iv-field">
            <label for="configArea">Konfiguration kopieren oder einfügen</label>
            <textarea id="configArea" spellcheck="false"></textarea>
          </div>
          <div class="iv-button-row">
            <button class="iv-secondary-button" id="exportButton" type="button">JSON exportieren</button>
            <button class="iv-primary-button" id="downloadHtmlButton" type="button">HTML-ZIP herunterladen</button>
            <button class="iv-secondary-button" id="importButton" type="button">Importieren</button>
            <button class="iv-danger-button" id="resetButton" type="button">Zurücksetzen</button>
          </div>
        </section>
      </div>
    </section>
  </main>
  <script src="script.js?v=50"></script>
  <script src="activity-editor.js?v=50"></script>
</body>
</html>
